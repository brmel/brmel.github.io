<main class="protocol today">

  <header class="topbar">
    <div class="wrap topbar__inner">
      <a class="topbar__brand" href="{{ "/adventures/operating-protocol/today/" | relURL }}">The Operating <em>Protocol</em></a>
      <nav class="topbar__nav" aria-label="Page switch">
        <a href="{{ "/adventures/operating-protocol/today/" | relURL }}" class="topbar__pageswitch is-active" aria-current="page">Today</a>
        <a href="{{ "/adventures/operating-protocol/" | relURL }}" class="topbar__pageswitch">Manual</a>
        <a href="{{ "/adventures/" | relURL }}" class="topbar__pageswitch" title="Back to Adventures">← Adventures</a>
        <button class="theme-toggle is-keep" data-theme-toggle aria-label="Toggle theme">☾</button>
      </nav>
    </div>
  </header>

  <div class="today__body">

    <section class="today__head">
      <div class="wrap">
        <div class="today__head-grid">
          <div>
            <h1 class="today__day" data-day>Today</h1>
            <div class="today__sub">
              <span><span class="dot" aria-hidden="true"></span> <strong data-train-badge>Session</strong></span>
              <span data-date>—</span>
            </div>
          </div>
          <div class="today__clock" data-clock aria-label="Current time">--:--<span class="sec">:--</span></div>
        </div>
      </div>
    </section>

    <section class="now">
      <div class="wrap">
        <div class="now__eyebrow">
          <span class="dot" aria-hidden="true"></span>
          <span>Now</span>
          <span class="slot" data-now-slot>—</span>
        </div>

        <h2 class="now__title" data-now-title>—</h2>
        <p class="now__action" data-now-action>—</p>

        <div class="now__progress" aria-hidden="true">
          <div class="now__progress-bar" data-now-bar></div>
        </div>

        <div class="now__meta">
          <span data-now-remain>—</span>
          <span data-now-next>—</span>
        </div>

        <div class="session" data-session></div>
      </div>
    </section>

    <section class="rail" aria-label="The day, slot by slot">
      <div class="wrap">
        <div class="rail__head">
          <h2 class="rail__title">The whole <em>day.</em></h2>
          <div class="rail__meta">
            <span class="rail__hint">Tap a card to mark it done</span>
            <span class="rail__counter" data-day-count><strong>0</strong>&nbsp;/&nbsp;13&nbsp;done</span>
          </div>
        </div>
        <ol class="day-grid" data-day-grid></ol>
      </div>
    </section>

  </div>

  <footer class="today__footer">
    <div class="wrap today__footer-inner">
      <span>The Operating Protocol · v1.0</span>
      <span><a href="{{ "/adventures/operating-protocol/" | relURL }}">Open the full manual →</a></span>
    </div>
  </footer>

</main>
